syntax = "proto3";

// Defines the custom Mahjong protocols.
// Used across Go (Backend), TypeScript (Frontend), and Python (AI).

package game;
option go_package = "github.com/plasma/fh-mahjong/proto/game";

// ---------------------------------------------------------
// Basic Entities
// ---------------------------------------------------------

enum Suit {
  SUIT_UNKNOWN = 0;
  SUIT_SOU = 1;
  SUIT_PIN = 2;
  SUIT_MAN = 3;
  SUIT_JIHAI = 4;
  SUIT_FLOWER = 5;
}

message Tile {
  // Unique identifier for the tile (0-143). 0-135 standard, 136-143 flowers.
  uint32 id = 1;
  Suit suit = 2;
  // For suits 1-3, value is 1-9. Wait! In mahjong it's 1-9 for sou/pin/man,
  // 1-7 for jihai (East, South, West, North, Haku, Hatsu, Chun).
  uint32 value = 3;
}

// ---------------------------------------------------------
// Actions & Events
// ---------------------------------------------------------

enum ActionType {
  ACTION_UNKNOWN = 0;
  // Base Actions
  ACTION_DRAW = 1;
  ACTION_DISCARD = 2;
  // Melds
  ACTION_CHII = 3; // sequence
  ACTION_PON = 4; // triplet
  ACTION_KAN = 5; // quad
  // Wins
  ACTION_TSUMO = 6; // self-draw win
  ACTION_RON = 7;   // steal win
  // Others
  ACTION_PASS = 8;       // pass on an opportunity to steal
  ACTION_FLOWER_REVEAL = 9; // Fenghua rule: drawing and exposing a flower tile
  ACTION_READY = 10;        // Signal readiness for next round after round end
  ACTION_ACCEPT_HAITEI = 11; // Accept drawing the last tile (haitei)
  ACTION_REFUSE_HAITEI = 12; // Refuse the last tile → ryuukyoku
}

message PlayerAction {
  ActionType type = 1;
  
  // The tile being acted upon (e.g. the tile being discarded or stolen).
  Tile tile = 2;

  // The subset of hand tiles revealed to complete the action (e.g. 2 tiles for a Chow/Pong).
  repeated Tile meld_tiles = 3;

  // Which player is targeted (0-3). 
  // (e.g. Who did we Ron from? Who did we Pong from?)
  uint32 target_player = 4;

  // Context flags for win evaluations
  bool is_robbing_kong = 5;
  bool is_bottom_tile = 6;
  bool is_blooming_kong = 7;
}

enum MeldDirection {
  MELD_DIRECTION_UNKNOWN = 0;
  MELD_DIRECTION_RIGHT = 1;
  MELD_DIRECTION_ACROSS = 2;
  MELD_DIRECTION_LEFT = 3;
}

message Meld {
  ActionType type = 1;
  repeated Tile tiles = 2;
  // Relative direction of the player who discarded the called tile.
  // 1: Right (shimocha), 2: Across (toimen), 3: Left (kamicha).
  MeldDirection called_direction = 3;
  // The ID of the specific tile that was called (useful for UI rendering to know which one to rotate sideways).
  uint32 called_tile_id = 4;
}

// ---------------------------------------------------------
// Game State
// ---------------------------------------------------------

message PlayerState {
  uint32 seat = 1; // 0=East, 1=South, 2=West, 3=North
  
  // Number of points the player has
  int32 score = 2;

  // The tiles currently held in the closed hand.
  // In a broadcast to other players, this might be empty for security.
  repeated Tile closed_hand = 3;

  // The number of tiles in the hand (always public).
  uint32 hand_size = 4;

  // Opened melds (Chows, Pongs, Kongs)
  repeated Meld open_melds = 5;

  // Discarded tiles pool 
  repeated Tile discards = 6;

  // Track the player's specific seat wind (1: East, 2: South, 3: West, 4: North)
  uint32 seat_wind = 7;

  // Track the specific flower tiles the player has melded (IDs 136-143)
  repeated Tile flower_melds = 8;

  // Kong bonus context flags (set by game loop before calling EvaluateHand)
  bool has_budding_direct_kong = 9;
  bool has_blooming_direct_kong = 10;
  bool has_budding_closed_kong = 11;
  bool has_blooming_closed_kong = 12;
  bool has_budding_risky_kong = 13;
  bool has_blooming_risky_kong = 14;
  bool has_blooming_flower_kong = 15;

  // Actions the player is currently allowed to take
  repeated PlayerAction valid_actions = 16;

  // The specific ID of the tile that was just drawn (used to render the gap on frontend).
  // optional prevents Javascript dropping the number 0 (since Tile ID 0 = 1m).
  optional int32 drawn_tile_id = 17;

  // Shanten number for this player's closed hand (-1 = complete, 0 = tenpai, 1+ = further away)
  int32 shanten = 18;
}

enum GamePhase {
  PHASE_INIT = 0;
  PHASE_DEAL = 1;
  PHASE_PLAYER_TURN = 2; // Waiting for them to discard
  PHASE_WAIT_DISCARDS = 3; // Someone discarded, waiting a few sec for steals
  PHASE_ROUND_END = 4;
}

message GameState {
  // UUID for the match
  string match_id = 1;

  GamePhase phase = 2;
  
  // Who's turn is it right now? (0-3)
  uint32 active_player = 3;

  // The 4 players.
  repeated PlayerState players = 4;

  // Number of tiles left in the wall
  uint32 wall_count = 5;
  
  // Current hand number (e.g. East 1 = 1, East 2 = 2)
  uint32 hand_num = 6;
  
  // The current active discard (if in PHASE_WAIT_DISCARDS)
  Tile active_discard = 7;

  // The current active wild tiles for this round
  repeated Tile wild_tiles = 8;

  // The prevailing (round) wind for Fenghua Mahjong (1=East, 2=South, 3=West, 4=North)
  uint32 prevailing_wind = 11;

  // The base64-encoded MT19937 seed used to shuffle the wall (for replay verification)
  string wall_seed = 12;

  // Round result data (populated when phase = PHASE_ROUND_END)
  RoundResult round_result = 13;

  // Per-player ready state for next round (length 4, indexed by seat)
  repeated bool player_ready = 14;

  // Dice sum (2-12) rolled at the start of each round
  uint32 dice_sum = 15;

  // Number of wangpai (dead wall) stacks reserved at the tail of the wall
  uint32 wangpai_stacks = 16;

  // True when the active player is being offered the haitei (last drawable) tile
  bool is_haitei = 17;

  // Individual dice rolled at the start of each round
  uint32 dice1 = 18;
  uint32 dice2 = 19;

  // Current number of drawable tiles left in the wangpai zone
  uint32 wangpai_tiles_left = 20;
}

// ---------------------------------------------------------
// Round Result (populated at PHASE_ROUND_END)
// ---------------------------------------------------------

message ScoreEntry {
  string pattern_name = 1;  // e.g. "Base Point (坐台)", "Pure One Suit (清一色)"
  int32 points = 2;
}

message PlayerPayout {
  uint32 seat = 1;
  int32 amount = 2;  // negative = pays, positive = receives
}

message RoundResult {
  uint32 winner_seat = 1;
  ActionType win_type = 2;           // ACTION_TSUMO or ACTION_RON
  uint32 discarder_seat = 3;         // Only meaningful for Ron
  repeated Tile winning_hand = 4;    // Winner's closed hand tiles
  repeated Meld winning_melds = 5;   // Winner's open melds
  Tile win_tile = 6;                 // The completing tile
  repeated ScoreEntry breakdown = 7; // Pattern-by-pattern scoring breakdown
  int32 total_score = 8;
  repeated PlayerPayout payouts = 9;
  bool is_draw = 10;                 // Exhaustive draw (no winner)
}

// ---------------------------------------------------------
// RL Environment Bridge
// ---------------------------------------------------------

message EnvConfig {
  repeated uint32 learning_seats = 1;
  bool auto_play_heuristics = 2;
  uint32 max_decisions = 3;
}

message SeatObservation {
  uint32 seat = 1;
  repeated float planes = 2;
  uint32 plane_channels = 3;
  uint32 plane_height = 4;
  uint32 plane_width = 5;
  repeated float scalars = 6;
  bytes action_mask = 7;
  uint32 action_space_size = 8;
  uint64 decision_index = 9;
  GamePhase phase = 10;
  uint32 active_player = 11;
}

message EnvResetRequest {
  uint64 seed = 1;
  EnvConfig config = 2;
}

message EnvResetResponse {
  SeatObservation observation = 1;
  repeated float rewards = 2;
  bool terminated = 3;
  bool truncated = 4;
}

message EnvStepRequest {
  uint32 action_id = 1;
}

message EnvStepResponse {
  SeatObservation observation = 1;
  repeated float rewards = 2;
  bool terminated = 3;
  bool truncated = 4;
}

message TrajectoryRequest {
  uint32 episodes = 1;
  uint64 start_seed = 2;
  EnvConfig config = 3;
}

message TrajectorySample {
  SeatObservation observation = 1;
  uint32 action_id = 2;
  repeated float rewards = 3;
  SeatObservation next_observation = 4;
  bool terminated = 5;
  bool truncated = 6;
  uint32 acting_seat = 7;
  uint64 episode_index = 8;
  repeated float terminal_rewards = 9;
}

message TrajectoryDataset {
  repeated TrajectorySample samples = 1;
}
