services:
  db:
    image: postgres:15-alpine
    container_name: fh_mahjong_db
    environment:
      POSTGRES_USER: fh_admin
      POSTGRES_PASSWORD: fh_password
      POSTGRES_DB: fh_mahjong
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fh_mahjong_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # Python policy server for the private-room RL agent.
  # Enabled via a profile: `docker compose --profile rl up` (policy only) or
  # `docker compose --profile full up` (policy + Go backend). The default
  # `docker compose up` still brings up only db + redis.
  #
  # The model checkpoint is NOT in the repo — provide a real .pt file:
  #   RL_CHECKPOINT_DIR=/abs/path/to/checkpoints RL_CHECKPOINT_FILE=epoch_006.pt \
  #   docker compose --profile full up
  policy:
    build:
      context: .
      dockerfile: ai/Dockerfile
    container_name: fh_mahjong_policy
    command:
      - "--manifest"
      - "/app/ai/checkpoints/best-checkpoints.json"
      - "--checkpoint"
      - "/checkpoints/${RL_CHECKPOINT_FILE:-model.pt}"
    volumes:
      - "${RL_CHECKPOINT_DIR:-./ai/checkpoints}:/checkpoints:ro"
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    profiles: ["rl", "full"]
    restart: unless-stopped

  # Go backend, wired to the policy service for the private-room RL agent.
  # RL_AGENT_POLICY_URL points only the RL path at `policy` (matchmaking bots are
  # unaffected); RL_AGENT_AUTOSTART=0 keeps the server from spawning its own copy.
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fh_mahjong_server
    environment:
      DATABASE_URL: "host=db user=fh_admin password=fh_password dbname=fh_mahjong port=5432 sslmode=disable TimeZone=UTC"
      RL_AGENT_POLICY_URL: "http://policy:8765/act"
      RL_AGENT_AUTOSTART: "0"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_started
      policy:
        condition: service_started
    profiles: ["full"]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
